providers:
  openai:
    base_url: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"
    model: "gpt-4.1-mini"
    temperature: 0.4
  deepseek:
    base_url: "https://api.deepseek.com/v1"
    api_key_env: "DEEPSEEK_API_KEY"
    model: "deepseek-chat"
    temperature: 0.4
  codex_app:
    runtime: "codex_app_server"
    command: "codex"
    model: "gpt-5.5"
    timeout_seconds: 60
profiles:
  - name: "TAG Bot"
    style: "tight_aggressive"
    provider: "heuristic"
    # provider: "openai"
    # provider: "codex_app"
  - name: "LAG Bot"
    style: "loose_aggressive"
    provider: "heuristic"
    # provider: "deepseek"
